<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ledge — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f6f7f5;
        color: #1c2333;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 360px;
      }
      .badge {
        width: 56px;
        height: 56px;
        border-radius: 999px;
        background: #2e3a59;
        color: #f6f7f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 20px;
        margin: 0 auto 16px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        color: #4a5268;
        font-size: 14px;
        line-height: 1.5;
        margin: 0 0 20px;
      }
      button {
        border: none;
        background: #2e3a59;
        color: #f6f7f5;
        font-weight: 600;
        font-size: 14px;
        padding: 10px 20px;
        border-radius: 999px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">L</div>
      <h1>You're offline</h1>
      <p>Ledge needs a connection to load or save your attendance. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
